trading:
  symbols:
    - BTCUSDT
    - ETHUSDT
  interval: "15m"
  # candle_limit is auto-computed from interval: (200 * 60 / interval_minutes) + 50.
  # Set explicitly here only if you need to override (e.g. candle_limit: 500).
  strategy: ema_trend_momentum
  # ── Strategy parameter tuning guide ────────────────────────────────────────
  # Periods below are used AS-IS — there is no auto-scaling.
  # When you change trading.interval, update fast_period / slow_period /
  # rsi_period / volume_lookback to match. Suggested values by interval:
  #
  #   interval │ fast │ slow │ rsi_period │ volume_lookback
  #   ─────────┼──────┼──────┼────────────┼────────────────
  #   1m       │  3–5 │ 8–13 │     9      │      10
  #   5m       │  6–9 │13–21 │    14      │      15
  #   15m      │   9  │  21  │    14      │      20   ← current
  #   1h       │ 9–12 │21–26 │    14      │      20
  #   4h       │ 9–12 │21–26 │    14      │      14
  #
  # Rules of thumb:
  #   • slow / fast ratio ≈ 2–3× (9/21 and 12/26 are classic pairs).
  #   • RSI 14 is reliable across most intervals; tighten to 9 for 1m–3m.
  #   • volume_lookback of 20 works for most intervals; drop to 10 for 1m.
  #   • trend_period (1h 200 EMA) is interval-independent — keep it at 200.
  #   • RSI entry bands (50–70 long / 30–50 short) are interval-independent.
  # ────────────────────────────────────────────────────────────────────────────
  strategy_params:
    fast_period: 9              # Fast EMA period
    slow_period: 21             # Slow EMA period (should be ~2–3× fast_period)
    trend_period: 200           # EMA period on 1h for trend gate (interval-independent)
    rsi_period: 14              # RSI lookback
    volume_lookback: 20         # RVOL baseline candles
    volume_multiplier: 1.2      # Current candle volume must exceed baseline by this multiple
    rsi_long_low: 50            # RSI floor for long entry
    rsi_long_high: 70           # RSI ceiling for long entry
    rsi_short_low: 30           # RSI floor for short entry
    rsi_short_high: 50          # RSI ceiling for short entry
    rsi_exit_overbought: 80     # Force-exit long when RSI reaches this
    rsi_exit_oversold: 20       # Force-exit short when RSI reaches this
    adx_period: 14              # ADX smoothing period (Wilder's, same as RSI — interval-independent)
    min_adx: 25                 # Skip entry if ADX < this; market is ranging (20=weak trend, 25=confirmed, 30=strong)

entry:
  gtx_timeout_secs: 5               # Seconds to wait per GTX attempt before cancelling and retrying
  gtx_attempts: 3                   # Number of GTX attempts before switching to IOC chase
  max_price_deviation_pct: 0.3      # Abort entry (both GTX and IOC) if price moves more than this % from signal

risk:
  max_position_size_usdt: 1000.0
  max_daily_loss_usdt: 50.0
  kill_switch: false
  leverage: 10
  stop_loss_limit_pct: 1.5                   # Hard SL: 1.5% against entry (preferred exit, less slippage)
  stop_loss_market_pct: 1.8                  # Safety-net SL: slightly wider to survive price gaps
  take_profit_limit_pct: 3.0                 # Maker TP limit order placed at this % above (long) or below (short) entry
  trailing_take_profit_activation_pct: 3.0   # Activate trailing TP at 3% profit (2:1 reward at 1.5% SL)
  trailing_take_profit_callback_rate: 0.5    # Trail by 0.5% from peak before triggering

trade_manager:
  poll_interval_secs: 10   # How often to check position/order state against Binance (recommended: 5–10s)

logging:
  level: INFO
  log_file: logs/bot.log
  rotation: "10 MB"
  retention: "7 days"
  debug_log_file: logs/bot.debug.log   # Optional: write all DEBUG logs to a separate file (remove key to disable)

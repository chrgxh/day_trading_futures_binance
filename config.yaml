trading:
  symbols:
    - BTCUSDT
    - ETHUSDT
  interval: "5m"
  strategy: ma_crossover
  strategy_params:
    fast_period: 9
    slow_period: 21

entry:
  limit_order_timeout_secs: 20      # Seconds to wait for a GTX limit order to fill before cancelling and retrying
  max_price_deviation_pct: 0.3      # Abort entry if price moves more than this % from the signal (crossover) price
  max_retries: 3                    # Max placement attempts per signal before giving up

risk:
  max_position_size_usdt: 1000.0
  max_daily_loss_usdt: 50.0
  kill_switch: false
  leverage: 10
  stop_loss_limit_pct: 1.0                   # Stop-limit SL: preferred exit, less slippage
  stop_loss_market_pct: 2.0                  # Stop-market SL: safety net if price gaps past limit
  trailing_take_profit_activation_pct: 1.0   # % move in profit before trailing TP activates
  trailing_take_profit_callback_rate: 0.2    # % price reversal from peak that triggers the trailing TP

logging:
  level: INFO
  log_file: logs/bot.log
  rotation: "10 MB"
  retention: "7 days"

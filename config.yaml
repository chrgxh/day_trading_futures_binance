# Top-level symbols: every strategy below watches every symbol in this list.
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - LINKUSDT

# Strategies. Each strategy declares its own intervals (in params) and runs over
# every symbol above. If two strategies fire on the same symbol simultaneously,
# the one listed first wins (one position per symbol, absolute).
strategies:
  - name: adaptive_trend_pullback
    params:
      # ---- Intervals (drive WebSocket subscriptions + buffer wiring) -------
      entry_interval: 30m        # all entry, exit, and trail decisions fire on close
      regime_interval: 4h        # macro trend filter, read-only

      # ---- Sizing & leverage ----------------------------------------------
      leverage: 20                # set per-symbol at startup
      notional_per_trade_usdt: 2000.0   # full USDT notional per entry; qty = notional / entry_price

      # ---- Regime filter (regime_interval) --------------------------------
      regime_ema_fast: 50
      regime_ema_slow: 200
      regime_slope_lookback: 5   # EMA_fast[-1] vs EMA_fast[-1-N]

      # ---- 30m entry indicators -------------------------------------------
      ema_fast: 50               # EMA on entry_interval (used for pullback + slope + close gate)
      slope_lookback: 5
      adx_period: 14
      adx_min: 20
      atr_period: 14
      atr_sma_period: 20         # "ATR > rolling avg" filter; also reused in dead-trade check
      rsi_period: 14
      rsi_max_long: 70
      rsi_min_short: 30
      volume_sma_period: 20

      # ---- Pullback definition --------------------------------------------
      # Directional touch: for LONGS the bar's LOW must reach down to (or below)
      # EMA_fast/VWAP — a small tolerance above is allowed for noisy wicks.
      # For SHORTS the bar's HIGH must reach up to (or above) the reference.
      # This is intentionally tighter than a symmetric "within X%" check, which
      # passes nearly every bar in a trending market.
      pullback_lookback: 3              # number of PRIOR bars to scan
      pullback_proximity_pct: 0.05      # wick tolerance above (long) / below (short) the reference
      vwap_enabled: true                # daily-anchored VWAP at UTC 00:00; false → EMA-only

      # ---- Entry execution (IOC chase) ------------------------------------
      max_price_deviation_pct: 0.15     # walk-away cap vs signal entry price
      ioc_poll_secs: 3.0                # re-quote cadence; 3s keeps us well under rate limits
      entry_timeout_secs: 60.0          # hard cap on the entire IOC loop

      # ---- Exits: stop, TP1, trail ----------------------------------------
      stop_atr_mult: 1.5                # initial stop distance from fill (in ATRs)
      tp1_r_multiple: 1.5               # TP1 distance from fill (in R)
      tp1_size_pct: 0.40                # fraction of filled qty placed at TP1
      tp1_retry_attempts: 2             # retries when GTX rejected (would be taker)
      tp1_retry_interval_secs: 3.0
      trail_atr_mult: 2.0               # trail = max_close - 2*ATR (recomputed each closed entry candle)

      # ---- Layered stop (stop-limit + stop-market backstop) ---------------
      # Every protective stop is a PAIR: a stop-limit at the configured stop
      # price (preferred fill, maker-leaning) plus a stop-market backstop a
      # bit further away (guarantees exit if the limit gets skipped). Both
      # legs are reduce-only; the backstop sizes itself via reduce-only if
      # the limit fills partially first.
      stop_limit_buffer_pct: 0.0        # limit price = trigger * (1 ± buffer/100); 0 → limit at trigger
      stop_market_backstop_pct: 0.1     # backstop trigger = stop * (1 ± offset/100); 0.1 → 0.1% past stop

      # ---- Exits: trend invalidation (any-of, on every closed entry candle)
      invalidation_structure_lookback: 20      # close below N-bar low (long) / above N-bar high (short)
      invalidation_strong_close_atr_mult: 0.5  # close beyond EMA_fast by >= mult*ATR against position
      invalidation_momentum_lookback: 3        # ADX drop measured over last K bars
      invalidation_momentum_adx_drop: 5        # ADX must drop by more than this AND
      invalidation_momentum_adx_floor: 20      # ADX must be below this for collapse exit

      # ---- Exits: dead trade (after candle N, all-of) ----------------------
      dead_trade_min_candles: 24        # candles since entry before the gate engages
      dead_trade_adx_lookback: 6        # ADX[0] < ADX[-N] AND ADX < floor
      dead_trade_adx_floor: 22
      dead_trade_r_floor: 1.0           # unrealized PnL per unit < N*R

  - name: bb_rsi_mean_reversion
    params:
      # ---- Intervals (drive WebSocket subscriptions + buffer wiring) -------
      entry_interval: 30m        # all entry, exit, and time-stop decisions fire on close
      regime_interval: 4h        # must be range-bound (low ADX, flat EMAs)
      macro_interval: 1d         # macro bias: UP → longs only, DOWN → shorts only, NEUTRAL → skip

      # ---- Sizing & leverage ----------------------------------------------
      leverage: 20                # set per-symbol at startup
      notional_per_trade_usdt: 2000.0   # qty = notional / entry_price

      # ---- Macro bias filter (macro_interval) — directional gate ----------
      macro_ema_fast: 50
      macro_ema_slow: 200

      # ---- Regime filter (regime_interval) — RANGE ONLY -------------------
      regime_adx_period: 14
      regime_adx_max_range: 20.0       # ADX <= this AND EMAs flat → range
      regime_adx_min_trend: 25.0       # ADX > this → trending, no trade / exit if held
      regime_ema_fast: 50
      regime_ema_slow: 200
      regime_ema_flatness_pct: 2.0     # |EMA_fast - EMA_slow| / close, in %

      # ---- 30m Bollinger Bands + companions -------------------------------
      bb_period: 20
      bb_num_std: 2.0
      rsi_period: 14
      rsi_oversold: 30.0
      rsi_overbought: 70.0
      atr_period: 14
      atr_sma_period: 20               # "ATR > rolling avg" filter (entry + invalidation)
      volume_sma_period: 20

      # ---- Entry gates ----------------------------------------------------
      pierce_lookback: 2                # current + prior bar(s) checked for band pierce
      volume_max_mult: 1.5              # block if volume > N * volume_SMA (panic spike)
      max_pierce_atr_mult: 1.0          # block if (bb_lower - close) > N * ATR (too far)
      atr_max_expansion_mult: 1.2       # block if ATR > N * ATR_SMA

      # ---- Entry execution (single-shot IOC LIMIT, NO chasing) ------------
      # Single IOC LIMIT at the signal close: fills at that price or better,
      # otherwise skips the trade. Pays the taker fee on entry by design — the
      # alternative GTX/post-only design has us silently missing valid reclaim
      # setups when the book has already drifted. No params needed.

      # ---- Exits: stop + dual TP -----------------------------------------
      stop_atr_mult: 1.0                # ATR-stop distance from fill (in ATRs)
      structure_stop_lookback: 5        # bars to scan for the swing low/high
      structure_stop_buffer_atr_mult: 0.1   # buffer past the swing (in ATRs)
      # Final stop = more conservative (closer to entry) of ATR stop and structure stop.
      tp1_size_pct: 0.70                # fraction taken at the bb middle
      tp2_size_pct: 0.30                # fraction taken at the opposite band (0 → skip)

      # ---- Break-even SL move (fires once any TP partial-fills) -----------
      break_even_offset_atr_mult: 0.0   # 0 = exact break-even; small +ve to cover fees

      # ---- Layered stop (stop-limit + stop-market backstop) ---------------
      # See adaptive_trend_pullback above for the rationale. Same defaults
      # work here; tighten the backstop offset if you want stops closer to
      # the trigger on thin alts.
      stop_limit_buffer_pct: 0.0        # limit price = trigger * (1 ± buffer/100); 0 → limit at trigger
      stop_market_backstop_pct: 0.1     # backstop trigger = stop * (1 ± offset/100); 0.1 → 0.1% past stop

      # ---- Exits: trend invalidation (any-of) -----------------------------
      max_outside_band_candles: 2       # N consecutive closes outside the relevant band → exit
      max_rsi_extreme_candles: 2        # N consecutive RSI<oversold (long) or >overbought (short) → exit

      # ---- Exits: time stop ----------------------------------------------
      time_exit_soft_candles: 8         # ~4h on 30m — soft exit if no mid-touch AND close wrong side of entry
      time_exit_hard_candles: 16        # ~8h on 30m — unconditional exit

risk_guard:
  max_concurrent_positions: 5
  max_daily_loss_usdt: 1000.0

state_manager:
  # Live state is driven by the authenticated user-data WebSocket. This is the
  # period of the safety-net full REST resync that corrects any event drift and
  # always runs after a reconnect.
  resync_interval_secs: 90
  grace_period_secs: 15
  # Persistent ownership store: maps live positions -> owning strategy + saved
  # strategy_state + saved exit order IDs. Rewritten on every state refresh. On
  # restart, strategies adopt entries whose positions still exist on Binance.
  positions_file: state/positions.json
  pnl_reporter:
    enabled: true
    csv_file: logs/pnl.csv

logging:
  level: INFO
  log_file: logs/bot.log
  rotation: "10 MB"
  retention: "7 days"
  debug_log_file: logs/bot.debug.log

# ---------------------------------------------------------------------------
# Example: adding a second strategy with a LiveTradeManager (commented out).
#
# Strategies run in the order they appear here — the first to fire on a symbol
# wins. A LiveTradeManager subscribes to StateManager updates and gets hooks
# (on_open / on_update / on_close) for per-strategy post-fill lifecycle logic.
# Most strategies (including adaptive_trend_pullback above) don't need one
# because they react to closed candles, not poll cadence.
# ---------------------------------------------------------------------------
#
# strategies:
#   - name: adaptive_trend_pullback   # first strategy keeps its block above
#     params:
#       entry_interval: 30m
#       regime_interval: 4h
#       leverage: 5
#       notional_per_trade_usdt: 100.0
#       # ...rest of params...
#
#   - name: example_other_strategy    # second strategy at a different interval
#     params:
#       entry_interval: 5m
#       leverage: 3
#       notional_per_trade_usdt: 50.0
#       # ...strategy-specific params...
#     live_trade_manager:
#       enabled: true                 # mount a LiveTradeManager for this strategy
#       params:
#         # Strategy-specific lifecycle parameters consumed by the LTM subclass,
#         # e.g. break-even trigger, partial-TP thresholds, stagnation timeouts.
#         break_even_at_r: 1.0
#         stagnation_max_candles: 40

# Top-level symbols: every strategy below watches every symbol in this list.
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - LINKUSDT

leverage: 20

# Strategies. Each entry runs at its own interval over all symbols. If two
# strategies fire on the same symbol simultaneously, the one listed first wins.
# Params are shared across all symbols for that strategy.
strategies:
  - name: ema_trend_momentum
    interval: 15m
    params:
      # Position sizing
      max_position_size_usdt: 2000.0     # USDT notional per position

      # Indicator periods (must match the interval — see tuning guide below)
      fast_period: 9
      slow_period: 21
      trend_period: 200                  # 1h EMA — interval-independent
      rsi_period: 14
      volume_lookback: 20
      adx_period: 14

      # Entry gates
      volume_multiplier: 1.5
      rsi_long_low: 50
      rsi_long_high: 70
      rsi_short_low: 30
      rsi_short_high: 50
      min_adx: 27

      # Exit pricing (placeholder — strategy will own this fully in a later pass)
      stop_loss_pct: 0.4
      stop_loss_market_pct: 0.6
      take_profit_pct: 3.0
      trailing_take_profit_activation_pct: 1.0
      trailing_take_profit_callback_rate: 0.5

      # Entry execution
      max_price_deviation_pct: 0.3
    live_trade_manager:
      enabled: false  # base LiveTradeManager has no behavior yet; enable when a subclass is in place

# Tuning guide — keep periods in sync with `interval`:
#   interval │ fast │ slow │ rsi_period │ volume_lookback
#   ─────────┼──────┼──────┼────────────┼────────────────
#   1m       │  3–5 │ 8–13 │      9     │      10
#   5m       │  6–9 │13–21 │     14     │      15
#   15m      │   9  │  21  │     14     │      20   ← current
#   1h       │ 9–12 │21–26 │     14     │      20
#   4h       │ 9–12 │21–26 │     14     │      14
# RSI bands and trend_period are interval-independent.

risk_guard:
  max_concurrent_positions: 3
  max_daily_loss_usdt: 50.0

state_manager:
  poll_interval_secs: 10
  grace_period_secs: 15
  pnl_refresh_every_n_polls: 6
  pnl_reporter:
    enabled: true
    csv_file: logs/pnl.csv

logging:
  level: INFO
  log_file: logs/bot.log
  rotation: "10 MB"
  retention: "7 days"
  debug_log_file: logs/bot.debug.log
